version: 1
skills:
  - id: skill.local-explainer
    name: Local Explainer
    path: ./skills/local-explainer/SKILL.md
    category: learning
    summary: "优先基于本地上下文解释概念、模板和运行链路。"
    triggers:
      explicit_mentions: ["@local-explainer"]
      task_patterns:
        - "解释这个项目"
        - "skill 是什么"
        - "mcp 是什么"
        - "怎么看运行链路"
    tools_required: [skill_discovery]
    mcp_preferred: []
    priority: 90

  - id: skill.web-researcher
    name: Web Researcher
    path: ./skills/web-researcher/SKILL.md
    category: learning
    summary: "当问题依赖最新公开信息时，先发现再调用 web-search MCP。"
    triggers:
      explicit_mentions: ["@web-researcher", "@mcp"]
      task_patterns:
        - "最新"
        - "最近"
        - "联网搜索"
        - "查资料"
        - "搜索网页"
    tools_required: [mcp_discovery]
    mcp_preferred: [web-search]
    priority: 120
